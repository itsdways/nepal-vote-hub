<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nepal Vote Hub 🇳🇵</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">
    🇳🇵 VoteHub
    <span class="live-badge">LIVE</span>
  </div>

  <div class="nav-links">
    <a href="#content">Poll</a>
    <a href="#content">Memes</a>
    <a href="#content">News</a>
    <a href="#content">Predict</a>
  </div>
</nav>

<!-- HERO -->
<header class="hero">
  <h1>Nepal Vote Hub</h1>
  <p>Track trends. Predict winners. Join the youth voice.</p>
  <button onclick="goToContent()">Start Predicting 🔥</button>
</header>

<!-- MAIN CONTENT -->
<main id="content" class="content">

  <div class="card">
    <h2>📊 Live Poll</h2>
    <button onclick="vote('A')">Party A</button>
    <button onclick="vote('B')">Party B</button>
    <p id="pollResult">Vote now</p>
  </div>

  <div class="card">
    <h2>😂 Meme Zone</h2>
    <img src="https://i.imgur.com/2DhmtJ4.jpg" alt="Meme">
  </div>

  <div class="card">
    <h2>📰 Trending News</h2>
    <p>Major political debate today 🔥</p>
  </div>

  <div class="card">
    <h2>🔮 Prediction</h2>
    <p>Party A leading by 10%</p>
  </div>

  <div class="card">
    <h2>🧠 Voter Personality Test</h2>
    <button onclick="answerQuiz('yes')">Yes</button>
    <button onclick="answerQuiz('no')">No</button>
    <p id="quizResult"></p>
  </div>

</main>

<footer>
  Made with ❤️ in Nepal
</footer>

<script src="script.js"></script>
</body>
</html>
